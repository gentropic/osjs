<!DOCTYPE html>
<!-- OSJS · OpenStereo, web edition — dev entry. ES modules run directly (no
     build for dev); serve over http (ESM won't load from file://): npx serve . -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSJS · stereonet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* drafting-table / instrument-paper (ported from the OS3 exploration) */
      --bg:#e9edf1; --panel:#f5f7f9; --panel-2:#ffffff; --raised:#e4e9ee;
      --line:#d8dee5; --line-2:#c3ccd5;
      --ink:#1d2733; --ink-dim:#5b6775; --ink-faint:#7c8a98;
      --amber:#e8920c; --accent-text:#b06f06; --cyan:#1aa39a; --cyan-text:#0e7d75;
      --on-accent:#15110a;
      --canvas-bg:#e9edf1; --canvas-grid:rgba(40,55,75,.05); --vignette:#f0f3f6;
      --ui:'Barlow',system-ui,sans-serif;
      --mono:'Space Mono','SFMono-Regular',ui-monospace,monospace;
    }
    body.theme-dark {
      /* flight-deck dark (ported from OS3) */
      --bg:#0a0d11; --panel:#12161c; --panel-2:#171c23; --raised:#1c222b;
      --line:#283039; --line-2:#333d49;
      --ink:#cad4df; --ink-dim:#6f7d8d; --ink-faint:#48535f;
      --amber:#f6b14a; --accent-text:#f6b14a; --cyan:#5fd0c5; --cyan-text:#5fd0c5;
      --on-accent:#0a0d11;
      --canvas-bg:#0a0d11; --canvas-grid:rgba(255,255,255,.014); --vignette:#11161d;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background: var(--bg); color: var(--ink); font-family: var(--ui); font-size: 13px;
           overflow: hidden;
           background-image: radial-gradient(circle at 50% -10%, var(--vignette) 0%, var(--bg) 60%); }
    * { scrollbar-width: thin; scrollbar-color: var(--line-2) transparent; }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
    *::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); background-clip: padding-box; }
    *::-webkit-scrollbar-track, *::-webkit-scrollbar-corner { background: transparent; }

    .osjs-app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; }
    button { font-family: var(--ui); color: var(--ink); background: transparent; border: 0; cursor: pointer; }
    button:focus:not(:focus-visible) { outline: none; }
    button:focus-visible { outline: 2px solid var(--accent-text); outline-offset: 1px; }

    /* header controls */
    .grp { display: flex; align-items: center; gap: 1px; background: var(--bg); border: 1px solid var(--line); border-radius: 5px; overflow: hidden; }
    .seg { padding: 5px 11px; font-size: 11px; letter-spacing: .06em; color: var(--ink-dim); background: var(--panel); }
    .seg:hover { color: var(--ink); }
    .seg.on { color: var(--on-accent); background: var(--amber); font-weight: 600; }
    .seg.dim { opacity: .35; cursor: default; }
    .ic-btn { padding: 4px 7px; display: inline-flex; align-items: center; }
    .ic { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.4; stroke-linejoin: round; stroke-linecap: round; }
    .grp.hidden { display: none; }
    .btn { padding: 5px 11px; font-size: 11px; letter-spacing: .07em; text-transform: uppercase;
           border: 1px solid var(--line-2); border-radius: 5px; color: var(--ink-dim); background: var(--panel); }
    .btn:hover { color: var(--ink); border-color: var(--ink-dim); }
    .btn.on { color: var(--on-accent); background: var(--cyan); border-color: var(--cyan); font-weight: 600; }
    .btn.icon { padding: 4px 9px; font-size: 13px; text-transform: none; }

    /* status footer */
    .statusbar { display: flex; align-items: center; gap: 10px; height: 26px; padding: 0 14px;
                 background: var(--panel); border-top: 1px solid var(--line);
                 font-family: var(--mono); font-size: 11px; color: var(--ink-dim); }
    .statusbar .cnt { color: var(--ink-faint); }
    .statusbar .measurebar { display: flex; gap: 6px; align-items: center; }
    .statusbar .measurebar .mini { padding: 1px 8px; font-size: 10px; border: 1px solid var(--line-2); border-radius: 4px; background: var(--panel); color: var(--ink-dim); cursor: pointer; }
    .statusbar .measurebar .mini:hover { color: var(--ink); border-color: var(--ink-dim); }
    .pvbtn { font-family: var(--mono); font-size: 10px; letter-spacing: .04em; padding: 2px 8px; border: 1px solid var(--line-2);
             border-radius: 4px; background: var(--panel); color: var(--ink-dim); cursor: pointer; }
    .pvbtn:hover { color: var(--ink); border-color: var(--ink-dim); }
    .pvbtn.on { color: var(--on-accent); background: var(--cyan); border-color: var(--cyan); }
    .zoomctl { display: flex; align-items: center; gap: 6px; }
    .zoomctl .zb { width: 18px; height: 18px; border: 1px solid var(--line-2); border-radius: 4px; background: var(--panel);
                   color: var(--ink-dim); font-size: 13px; line-height: 1; cursor: pointer; }
    .zoomctl .zb:hover { color: var(--ink); border-color: var(--ink-dim); }
    .zoomctl .zpct { min-width: 42px; text-align: right; font-family: var(--mono); font-size: 11px; color: var(--ink-dim);
                     background: none; border: 0; cursor: pointer; padding: 0; }
    .zoomctl .zpct:hover { color: var(--ink); }
    .zoomslider { width: 96px; height: 14px; cursor: pointer; accent-color: var(--cyan); }

    /* header / brand */
    .topbar { display: flex; align-items: center; gap: 14px; padding: 0 14px; height: 44px;
              background: linear-gradient(var(--panel-2), var(--panel)); border-bottom: 1px solid var(--line); }
    .brand { display: flex; align-items: baseline; gap: 8px; user-select: none; }
    .brand .glyph { color: var(--accent-text); font-size: 17px; line-height: 1; transform: translateY(2px); }
    .brand .name { font-weight: 700; letter-spacing: .16em; font-size: 15px; }
    .brand .sub { color: var(--ink-faint); font-family: var(--mono); font-size: 10px; letter-spacing: .04em; }
    .spacer { flex: 1; }

    /* 3-column body: data · tabbed plots · inspector — side/inspector widths are
       resizable (drag the gutters); minmax(0,1fr) lets the plot column shrink. */
    .body { display: grid; grid-template-columns: var(--side-w, 264px) 5px minmax(0, 1fr) 5px var(--insp-w, 300px); min-height: 0; }
    .side, .inspector { background: var(--panel); overflow: hidden auto; min-height: 0; }   /* never scroll sideways */
    .side { border-right: 1px solid var(--line); }
    .gutter { background: transparent; cursor: col-resize; }
    .gutter:hover, .gutter.drag { background: var(--line-2); }
    .inspector { border-left: 1px solid var(--line); }

    /* tabbed plot area */
    .main { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    .tabs { display: flex; gap: 2px; padding: 8px 12px 0; border-bottom: 1px solid var(--line); flex: 0 0 auto; }
    .tab { padding: 6px 14px; font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
           color: var(--ink-dim); border-bottom: 2px solid transparent; }
    .tab:hover { color: var(--ink); }
    .tab.on { color: var(--ink); border-bottom-color: var(--amber); }
    .plotarea { flex: 1; min-height: 0; position: relative;
            background:
              repeating-linear-gradient(0deg, transparent 0 23px, var(--canvas-grid) 23px 24px),
              repeating-linear-gradient(90deg, transparent 0 23px, var(--canvas-grid) 23px 24px),
              var(--canvas-bg); }
    .plotwrap { position: absolute; inset: 0; align-items: center; justify-content: center; }
    /* annotation overlay (composition layer over the net) */
    .annolayer { position: absolute; pointer-events: none; z-index: 2; }
    .anno-leaders { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    .anno-label { position: absolute; transform: translate(-50%, -50%); white-space: nowrap; cursor: move;
                  pointer-events: auto; padding: 1px 3px; border-radius: 3px; user-select: none; line-height: 1.1; }
    .anno-label:hover { background: color-mix(in srgb, var(--panel) 70%, transparent); }
    .anno-label.sel { outline: 1px dashed var(--cyan); }
    .anno-label.under { opacity: .4; }   /* anchor on the hidden hemisphere */
    .anno-label.box { border: 1px solid var(--line-2); box-shadow: 0 1px 3px rgba(40,55,75,.12); }
    .anno-label.locked { cursor: default; }
    .anno-label.editing { cursor: text; background: var(--panel-2); box-shadow: 0 0 0 1px var(--cyan); outline: none; white-space: pre-wrap; }
    /* generous invisible hit target; the visible dot (::after) reveals on hover / when selected */
    .anno-handle { position: absolute; transform: translate(-50%, -50%); width: 20px; height: 20px; pointer-events: auto; cursor: move; z-index: 2; }
    .anno-handle::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
                          width: 9px; height: 9px; border-radius: 50%; background: var(--panel-2); border: 1.5px solid var(--cyan);
                          opacity: 0; transition: opacity .12s, width .12s, height .12s; }
    .anno-handle.sel::after { opacity: 1; }
    .anno-handle:hover::after { opacity: 1; width: 12px; height: 12px; }
    .anno-handle.locked { cursor: default; }
    .anno-handle.locked::after { border-color: var(--ink-faint); }
    /* data selection (lasso / cone) */
    .sellayer { position: absolute; z-index: 5; pointer-events: none; cursor: crosshair; overflow: visible; }
    .sel-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    .sel-ring { fill: none; stroke: var(--amber); stroke-width: 1.5; }
    .sel-ring.back { opacity: .4; stroke-dasharray: 2 2; }
    .lasso { fill: color-mix(in srgb, var(--cyan) 12%, transparent); stroke: var(--cyan); stroke-width: 1.5; stroke-dasharray: 4 3; }
    .cone { fill: none; stroke: var(--cyan); stroke-width: 1.5; stroke-dasharray: 4 3; }
    .selcount { color: var(--cyan-text); font-weight: 600; }
    /* linked identify / brushing (table ⇄ plot) */
    .brushlayer { position: absolute; pointer-events: none; z-index: 2; overflow: visible; }
    .brushring { position: absolute; width: 22px; height: 22px; margin: -11px 0 0 -11px; border-radius: 50%;
                 border: 2px solid var(--cyan); box-shadow: 0 0 0 2px color-mix(in srgb, var(--cyan) 30%, transparent); }
    .brushring.back { opacity: .45; border-style: dashed; }
    .dtable .td.flash, .dtable .th.flash { background: color-mix(in srgb, var(--cyan) 22%, var(--panel-2)); }
    /* floating data-table panels (composition overlay) */
    .panellayer { position: absolute; pointer-events: none; z-index: 3; overflow: visible; }
    .floatpanel { position: absolute; pointer-events: auto; display: flex; flex-direction: column; min-width: 150px;
                  background: var(--panel); border: 1px solid var(--line-2); border-radius: 6px; box-shadow: 0 6px 22px rgba(40,55,75,.20); overflow: hidden; }
    .floatpanel.sel { outline: 1px solid var(--cyan); }
    .floatpanel.min { max-height: none; }
    .fp-bar { display: flex; align-items: center; gap: 8px; padding: 4px 4px 4px 8px; cursor: move; user-select: none;
              background: linear-gradient(var(--panel-2), var(--panel)); border-bottom: 1px solid var(--line); }
    .floatpanel.min .fp-bar { border-bottom: 0; }
    .fp-title { flex: 1; font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fp-actions { display: flex; gap: 1px; }
    .fp-btn { width: 20px; height: 20px; border-radius: 4px; color: var(--ink-dim); font-size: 12px; line-height: 1; }
    .fp-btn:hover { color: var(--ink); background: var(--raised); }
    .fp-body { padding: 8px; overflow: auto; min-height: 0; }
    .fp-body .tablebox { gap: 6px; height: auto; }
    .fp-resize { position: absolute; right: 0; bottom: 0; width: 14px; height: 14px; cursor: nwse-resize; touch-action: none; }
    .fp-resize::after { content: ''; position: absolute; right: 3px; bottom: 3px; width: 6px; height: 6px;
                        border-right: 2px solid var(--ink-faint); border-bottom: 2px solid var(--ink-faint); }
    /* context menu */
    .ctxmenu { position: fixed; z-index: 1000; min-width: 188px; padding: 4px; display: flex; flex-direction: column;
               background: var(--panel-2); border: 1px solid var(--line-2); border-radius: 7px; box-shadow: 0 8px 28px rgba(40,55,75,.22); font-size: 12px; }
    .ctx-item { display: flex; align-items: center; gap: 7px; text-align: left; padding: 6px 10px; border-radius: 4px;
                color: var(--ink); background: none; border: 0; cursor: pointer; white-space: nowrap; }
    .ctx-item:hover:not(:disabled) { background: var(--cyan); color: var(--on-accent); }
    .ctx-item:disabled { color: var(--ink-faint); cursor: default; }
    .ctx-item.danger { color: #c0445f; }
    .ctx-item.danger:hover { background: #c0445f; color: #fff; }
    .ctx-check { flex: 0 0 auto; width: 12px; font-size: 11px; color: var(--cyan-text); }
    .has-toggles .ctx-label, .ctx-label { flex: 1 1 auto; }
    .ctx-arrow { flex: 0 0 auto; font-size: 10px; color: var(--ink-faint); }
    .ctx-item:hover .ctx-check, .ctx-item:hover .ctx-arrow { color: inherit; }
    .ctx-sep { height: 1px; margin: 4px 6px; background: var(--line); }
    /* data table tab */
    .tablewrap { align-items: stretch; justify-content: flex-start; padding: 14px; }
    .tablebox { display: flex; flex-direction: column; gap: 8px; width: 100%; height: 100%; min-height: 0; }
    .thead-row { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; flex-wrap: nowrap; }
    .tcount { flex: 1 1 auto; min-width: 0; font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thead-actions { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }
    .mini { font: inherit; font-size: 11px; padding: 3px 9px; border: 1px solid var(--line-2); border-radius: 5px; background: var(--panel); color: var(--ink-dim); cursor: pointer; }
    .mini:hover { color: var(--ink); border-color: var(--ink-dim); }
    .tscroll { flex: 1; min-height: 0; overflow: auto; border: 1px solid var(--line); border-radius: 6px; background: var(--panel-2); }
    /* div-based grid table (real <table> can't survive sideact's template parser) */
    .dtable { display: grid; align-content: start; font-family: var(--mono); font-size: 12px; width: max-content; min-width: 100%; }
    .dtable .th, .dtable .td { border-bottom: 1px solid var(--line); border-right: 1px solid var(--line);
                padding: 3px 8px; white-space: nowrap; overflow: hidden; display: flex; align-items: center; }
    .dtable .th { position: sticky; top: 0; background: var(--panel); color: var(--ink-dim); font-weight: 600; z-index: 1; }
    .dtable .th .thtext { overflow: hidden; text-overflow: ellipsis; }
    .colgrip { position: absolute; top: 0; right: 0; width: 7px; height: 100%; cursor: col-resize; touch-action: none; z-index: 3; }
    .colgrip:hover { background: var(--cyan); opacity: .5; }
    .dtable .rownum { color: var(--ink-faint); justify-content: flex-end; }
    .dtable .td.rownum { position: sticky; left: 0; background: var(--panel-2); }
    .dtable .th.rownum { left: 0; z-index: 2; }
    .dtable input.tc, .dtable input.thi { font: inherit; width: 100%; min-width: 56px; border: 1px solid transparent;
                background: transparent; color: var(--ink); padding: 1px 3px; border-radius: 3px; }
    .dtable input.tc:focus, .dtable input.thi:focus { border-color: var(--line-2); background: var(--panel); outline: none; }
    .dtable input.thi { font-weight: 600; color: var(--ink-dim); }
    .dtable .th input.thi { flex: 1 1 auto; width: auto; min-width: 0; }   /* share the header with the delete button + grip */
    .dtable .thdel { flex: 0 0 auto; margin-right: 7px; border: 0; background: none; color: var(--ink-faint);
                     cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; }
    .dtable .thdel:hover { color: #d24b6b; }
    .dtable .tdel { padding: 0; justify-content: center; }
    .dtable .tdel .rm { border: 0; background: none; color: var(--ink-faint); cursor: pointer; font-size: 15px; line-height: 1; }
    .dtable .tdel .rm:hover { color: #d24b6b; }
    .plotwrap svg { width: min(70vh, 560px); height: auto; filter: drop-shadow(0 1px 6px rgba(40,55,75,.10)); position: relative; z-index: 1; }
    /* figure page frame (behind the net; pans/zooms with it) */
    .pagelayer { position: absolute; pointer-events: none; z-index: 0; overflow: visible; }
    .pageframe { position: absolute; border: 1px solid var(--line-2); box-shadow: 0 2px 16px rgba(40,55,75,.14); }
    /* guided empty state */
    .emptystate { position: absolute; inset: 0; align-items: center; justify-content: center; pointer-events: none; }
    .es-card { pointer-events: auto; text-align: center; padding: 22px 26px; background: color-mix(in srgb, var(--panel) 90%, transparent);
               border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 2px 14px rgba(40,55,75,.12); max-width: 360px; }
    .es-glyph { font-size: 30px; color: var(--accent-text); line-height: 1; }
    .es-title { font-weight: 700; font-size: 17px; letter-spacing: .02em; margin: 8px 0 2px; }
    .es-sub { color: var(--ink-dim); font-size: 12.5px; margin-bottom: 12px; }
    .es-samples { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .es-hint { margin-top: 14px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); }
    .samplesrow { display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 8px; padding: 4px 12px 12px; }
    .samplesrow > span { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); }
    .slink { font: inherit; font-size: 11px; color: var(--cyan-text); background: none; border: 0; padding: 0; cursor: pointer; }
    .slink:hover { text-decoration: underline; }
    /* net legend overlay */
    /* composition decorations (draggable legend + title, figure space) */
    .decorlayer { position: absolute; pointer-events: none; z-index: 2; overflow: visible; }
    .netlegend { position: absolute; max-width: 60%; pointer-events: auto; cursor: move; }
    .netlegend.sel { outline: 1px dashed var(--cyan); outline-offset: 2px; }
    .lg { display: flex; flex-direction: column; gap: 5px; padding: 8px 10px; font-size: 11px;
          background: color-mix(in srgb, var(--panel) 86%, transparent); border: 1px solid var(--line);
          border-radius: 6px; box-shadow: 0 1px 6px rgba(40,55,75,.10); backdrop-filter: blur(2px); }
    .lgitem { display: flex; align-items: center; gap: 7px; color: var(--ink-dim); }
    .lgitem .sw { width: 11px; height: 11px; border-radius: 3px; flex: 0 0 auto; border: 1px solid rgba(0,0,0,.12); }
    .lgname { font-weight: 600; color: var(--ink); white-space: nowrap; }
    .lgcats { display: flex; flex-wrap: wrap; gap: 2px 8px; }
    .lgcat { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 10px; }
    .lgramp { display: flex; align-items: center; gap: 7px; }
    .lgbar { width: 84px; height: 9px; border-radius: 3px; border: 1px solid var(--line-2); }
    .lgrange { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); white-space: nowrap; }

    /* section headers */
    .sect { display: flex; align-items: center; gap: 8px; padding: 9px 12px;
            border-bottom: 1px solid var(--line); color: var(--ink-dim);
            font-size: 10px; letter-spacing: .18em; text-transform: uppercase; font-weight: 600; }
    .sect .count { margin-left: auto; font-family: var(--mono); color: var(--ink-faint); font-weight: 400; }

    /* data list */
    .list { padding: 4px 0; }
    .it { display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer; }
    .it:hover { background: var(--panel-2); }
    .it.sel { background: var(--panel-2); box-shadow: inset 3px 0 0 var(--amber); }
    .it .sw { width: 13px; height: 13px; border-radius: 3px; flex: 0 0 auto; border: 1px solid rgba(0,0,0,.12); }
    .it .nm { flex: 1; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .it .nm.editing { overflow: visible; text-overflow: clip; cursor: text; background: var(--panel-2);
                      box-shadow: 0 0 0 1px var(--cyan); border-radius: 3px; padding: 0 3px; }
    .it .ty { font-family: var(--mono); font-size: 9px; letter-spacing: .04em; color: var(--ink-faint);
              border: 1px solid var(--line-2); border-radius: 3px; padding: 1px 5px; }
    .it .rm { border: 0; background: none; color: var(--ink-faint); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; }
    .it .rm:hover { color: #d24b6b; }
    .it input[type="checkbox"] { accent-color: var(--cyan); }
    .it .caret { border: 0; background: none; color: var(--ink-dim); cursor: pointer; font-size: 15px; line-height: 1; width: 18px; text-align: center; padding: 0; flex: 0 0 auto; }
    .it .caret:hover { color: var(--ink); }
    .kidswrap { display: none; }
    .grp-kids { display: block; margin-left: 16px; border-left: 1px solid var(--line); }
    .it .folder { color: var(--accent-text); font-size: 12px; line-height: 1; flex: 0 0 auto; }
    .grp-row .nm { font-weight: 700; }
    .it.drop { box-shadow: inset 0 -2px 0 0 var(--cyan); }            /* drop after */
    .grp-row.drop { box-shadow: inset 0 0 0 2px var(--cyan); border-radius: 4px; }  /* drop into */
    .sect .sectbtn { margin-left: 8px; font: inherit; font-size: 10px; letter-spacing: .06em;
                     color: var(--ink-dim); background: none; border: 1px solid var(--line-2);
                     border-radius: 4px; padding: 1px 7px; cursor: pointer; }
    .sect .sectbtn:hover { color: var(--ink); border-color: var(--ink-dim); }
    .kids { padding: 2px 0 7px 36px; display: flex; flex-direction: column; gap: 4px; }
    .layer { display: flex; align-items: center; gap: 6px; color: var(--ink-dim); font-size: 12px; cursor: pointer; }
    .layer input { accent-color: var(--cyan); }

    /* add-data */
    .add { margin: 8px 12px; padding: 7px 10px; width: calc(100% - 24px); cursor: pointer;
           font: inherit; font-size: 11px; letter-spacing: .07em; text-transform: uppercase;
           color: var(--ink-dim); background: var(--panel); border: 1px dashed var(--line-2); border-radius: 5px; }
    .add:hover { color: var(--ink); border-color: var(--ink-dim); }
    .form { padding: 8px 12px; display: flex; flex-direction: column; gap: 7px; }
    .frow { display: flex; gap: 6px; }
    .form select, .form .ni, .form .ta { font: inherit; padding: 5px 7px; background: var(--panel-2);
            color: var(--ink); border: 1px solid var(--line); border-radius: 5px; }
    .form .ta { width: 100%; resize: vertical; font-family: var(--mono); font-size: 12px; line-height: 1.45; }
    .form .ni { flex: 1; min-width: 0; }
    .form .go { background: var(--cyan); color: #fff; border: 1px solid var(--cyan); border-radius: 5px;
                padding: 5px 14px; cursor: pointer; font-weight: 600; }
    .form button:not(.go) { background: var(--panel); border: 1px solid var(--line-2); border-radius: 5px;
                padding: 5px 12px; color: var(--ink-dim); cursor: pointer; }
    .form .file { font: inherit; font-size: 11px; color: var(--ink-dim); }
    .form .file::file-selector-button { font: inherit; font-size: 11px; margin-right: 8px; padding: 4px 9px;
                background: var(--panel); color: var(--ink-dim); border: 1px solid var(--line-2); border-radius: 5px; cursor: pointer; }
    .mapping { display: flex; flex-direction: column; gap: 6px; padding-top: 7px; border-top: 1px solid var(--line); }
    .mhint { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); }
    .mrow { display: grid; grid-template-columns: 74px 1fr; align-items: center; gap: 8px; color: var(--ink-dim); }
    .mrow select { width: 100%; font: inherit; padding: 3px 5px; background: var(--panel-2);
                color: var(--ink); border: 1px solid var(--line); border-radius: 4px; }

    /* properties */
    .props { padding: 8px 12px 16px; }
    .pbody { display: flex; flex-direction: column; gap: 9px; }
    .psec { display: contents; }  /* section wrapper: groups nodes for sideact, no layout box */
    /* collapsible sections: click the title to fold; works despite display:contents
       because display:none on the children still applies */
    .psec > .istit { cursor: pointer; }
    .psec > .istit::after { content: '▾'; float: right; font-size: 9px; color: var(--ink-faint); margin-left: 6px; }
    .psec.collapsed > .istit::after { content: '▸'; }
    .psec.collapsed > :not(.istit) { display: none; }
    .phead { font-weight: 700; display: flex; gap: 8px; align-items: baseline; }
    /* every property row is a uniform 2-column grid: key | control */
    /* responsive rows: key | control side-by-side, but a too-wide control wraps
       to its own full-width line instead of overflowing the panel */
    .props label { display: flex; flex-wrap: wrap; align-items: center; gap: 4px 8px; min-height: 24px; }
    .props .fk { flex: 0 0 78px; color: var(--ink-dim); }
    .props .fv { flex: 1 1 130px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; min-width: 0; justify-content: flex-end; }
    .props .fv .grp.small { flex-wrap: wrap; overflow: visible; }
    .props input[type="number"] { width: 58px; font: inherit; padding: 2px 5px; border: 1px solid var(--line); border-radius: 4px; background: var(--panel-2); }
    .props input[type="color"] { width: 34px; height: 22px; padding: 0; border: 1px solid var(--line-2); border-radius: 4px; background: none; }
    .props input[type="checkbox"] { accent-color: var(--cyan); }
    .stat { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); padding-top: 2px; }
    .muted { color: var(--ink-faint); padding: 4px 0; }
    /* inspector section title + range control */
    .istit { margin: 12px 0 2px; color: var(--ink-faint); font-size: 10px; letter-spacing: .16em;
             text-transform: uppercase; font-weight: 600; border-bottom: 1px solid var(--line); padding-bottom: 4px; }
    .props .rngwrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .props .rngwrap .rng { flex: 1; min-width: 0; accent-color: var(--cyan); }
    .props .rngval { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); min-width: 32px; text-align: right; }
    .props .ro { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--ink-faint); white-space: nowrap; }
    /* toggle chips (independent on/off, vs the mutually-exclusive .seg groups) */
    .chips { display: flex; gap: 4px; flex-wrap: wrap; }
    /* categorical class table (editable swatch · value · count) */
    .classtable { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
    .classhead { display: flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: .08em;
                 text-transform: uppercase; color: var(--ink-faint); }
    .classhead > span { margin-right: auto; }
    .classrow { display: flex; align-items: center; gap: 8px; cursor: default; }
    .classrow input[type="color"] { width: 26px; height: 18px; padding: 0; border: 1px solid var(--line-2); border-radius: 3px; background: none; flex: 0 0 auto; }
    .classrow .cval { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .classrow .ccount { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); }
    /* ramp preview + clamp */
    .ramptable { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
    .ramptable .rampbar { height: 12px; border-radius: 3px; border: 1px solid var(--line-2); }
    .ramptable input[type="number"] { width: 64px; }
    .chip { padding: 3px 8px; font-size: 10px; letter-spacing: .03em; border: 1px solid var(--line-2);
            border-radius: 4px; background: var(--panel); color: var(--ink-dim); cursor: pointer; }
    .chip:hover { color: var(--ink); border-color: var(--ink-dim); }
    .chip.on { background: var(--cyan); border-color: var(--cyan); color: var(--on-accent); font-weight: 600; }

    /* inspector: rich properties + settings */
    .nameedit { font: inherit; font-weight: 700; font-size: 14px; border: 0; border-bottom: 1px solid transparent;
                background: none; color: var(--ink); width: 100%; padding: 1px 0; }
    .nameedit:focus { outline: none; border-bottom-color: var(--line-2); }
    .ptype { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); margin: 1px 0 8px; }
    .stats { display: flex; flex-direction: column; gap: 5px; margin-top: 12px; font-family: var(--mono); font-size: 11px; }
    .srow { display: flex; justify-content: space-between; gap: 10px; }
    .srow span { color: var(--ink-faint); }
    .srow b { color: var(--ink-dim); font-weight: 400; }
    .settings { padding: 8px 12px 16px; display: flex; flex-direction: column; gap: 11px; }
    .settings label { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: var(--ink-dim); }
    .settings select { font: inherit; background: var(--panel-2); border: 1px solid var(--line-2); border-radius: 4px; color: var(--ink); padding: 2px 4px; }
    .grp.small { border: 1px solid var(--line); border-radius: 5px; overflow: hidden; }
    .grp.small .seg { padding: 3px 9px; font-size: 10px; }

    /* preview = restyle the FIGURE to camera-ready, but keep editing (rails stay).
       The same figure-restyle is reused for print below. */
    /* hide only NON-flow chrome with display:none (no layout impact) … */
    body.preview .anno-handle, body.preview .fp-resize, body.preview .colgrip, body.preview .emptystate { display: none; }
    /* … but hide in-flow chrome (panel buttons, table toolbar) with VISIBILITY so
       the layout — and therefore the table's position — does NOT shift in preview. */
    body.preview .fp-actions, body.preview .thead-row .btn, body.preview .thead-row .mini { visibility: hidden; }
    body.preview .anno-label.sel, body.preview .floatpanel.sel, body.preview .netlegend.sel { outline: none; }
    body.preview .anno-label, body.preview .netlegend, body.preview .floatpanel, body.preview .fp-bar { cursor: default; }
    body.preview .anno-label:hover { background: transparent; }
    body.preview .floatpanel { box-shadow: 0 0 0 1px var(--line-2); }
    body.preview .fp-bar { background: none; }
    body.preview .plotarea { background-image: none; }                    /* drop the engineering grid */

    /* print = the active figure only, with NO layout reflow (so the absolutely-
       positioned overlays keep their coordinates). Hide everything via visibility,
       reveal just the plot subtree; same figure-restyle as preview. */
    @media print {
      body * { visibility: hidden !important; }
      .plotwrap, .plotwrap * { visibility: visible !important; }
      .anno-handle, .fp-resize, .colgrip, .emptystate { display: none !important; }
      .fp-actions, .thead-row .btn, .thead-row .mini { visibility: hidden !important; }   /* keep layout → table stays put */
      .anno-label.sel, .floatpanel.sel, .netlegend.sel { outline: none !important; }
      .floatpanel { box-shadow: 0 0 0 1px var(--line-2) !important; }
      .fp-bar { background: none !important; }
      .plotarea { background-image: none !important; }
      body, html { background: #fff !important; }
      @page { margin: 10mm; }
    }
  </style>
</head>
<body>
  <div id="osjs"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
