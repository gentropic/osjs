name: Deploy to GitHub Pages

# OSJS runs directly from source (zero-build dev: ES modules + vendored libs), so
# the live site is just the repo served statically — the same layout the browser
# smoke test serves over http. No build step needed; the single-file dist is a
# separate offline/embedding artifact, not the deployed app.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; let a newer push supersede an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
